<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hero Slider</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="slider">
        <div class="slide active">
          <img src="/Image/b1.jpg" />
          <div class="content">
            <h2>Web Development</h2>
            <p>Modern and responsive websites</p>
            <button>Learn More</button>
          </div>
        </div>

        <div class="slide">
          <img src="/Image/b2.jpg" />
          <div class="content">
            <h2>AI Projects</h2>
            <p>Smart automation solutions</p>
            <button>View Project</button>
          </div>
        </div>

        <div class="slide">
          <img src="/Image/b3.jpg" />
          <div class="content">
            <h2>Graphic Design</h2>
            <p>Creative and eye-catching visuals</p>
            <button>Explore</button>
          </div>
        </div>
      </div>

      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>
    </section>

    <script src="script.js"></script>
  </body>
</html>
